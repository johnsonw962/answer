<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>当季菜单 | Coffee Profile</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap");

    :root {
      --bg: #f8f1e6;
      --paper: rgba(255, 250, 239, 0.82);
      --ink: #2a1b16;
      --muted: #76685d;
      --line: rgba(157, 125, 81, 0.24);
      --moss: #435742;
      --citrus: #c58b42;
      --gold: #b88a46;
      --shadow: 0 28px 80px rgba(58, 38, 22, 0.12);
      --body-font: "LXGW WenKai", "霞鹜文楷", "Kaiti SC", "KaiTi", "STKaiti", "ZCOOL XiaoWei", "PingFang SC", "Microsoft YaHei", serif;
      --display-font: "Ma Shan Zheng", "LXGW WenKai", "霞鹜文楷", "Kaiti SC", "KaiTi", "STKaiti", cursive;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 14% 10%, rgba(197, 139, 66, 0.16), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(67, 87, 66, 0.13), transparent 26%),
        radial-gradient(circle at 50% 88%, rgba(184, 138, 70, 0.14), transparent 32%),
        linear-gradient(180deg, #fbf7ee 0%, #f4ead9 48%, #fbf6ec 100%);
      color: var(--ink);
      font-family: var(--body-font);
      line-height: 1.72;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 22%, rgba(42, 27, 22, 0.12) 0 1px, transparent 1.5px),
        radial-gradient(circle at 78% 34%, rgba(42, 27, 22, 0.10) 0 1px, transparent 1.5px),
        radial-gradient(circle at 34% 66%, rgba(42, 27, 22, 0.08) 0 1px, transparent 1.5px),
        linear-gradient(90deg, rgba(70, 88, 71, 0.045), transparent 18%, transparent 82%, rgba(197, 139, 66, 0.055));
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.52), transparent 82%);
    }

    .page::after {
      content: "";
      position: fixed;
      right: min(7vw, 88px);
      top: 118px;
      width: 230px;
      aspect-ratio: 1;
      pointer-events: none;
      border: 1px solid rgba(184, 138, 70, 0.18);
      border-radius: 50%;
      background:
        linear-gradient(90deg, transparent calc(50% - .5px), rgba(184, 138, 70, 0.14) 50%, transparent calc(50% + .5px)),
        linear-gradient(0deg, transparent calc(50% - .5px), rgba(184, 138, 70, 0.14) 50%, transparent calc(50% + .5px));
      box-shadow:
        0 0 0 28px rgba(184, 138, 70, 0.035),
        inset 0 0 0 26px rgba(255, 255, 255, 0.18);
      opacity: .72;
    }

    .site-header {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 14px;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 30px 0 24px;
      border-bottom: 1px solid var(--line);
    }

    .site-header::after {
      content: "☉  ☽  ✦  ☿";
      position: absolute;
      right: 0;
      top: 32px;
      color: rgba(92, 72, 45, 0.34);
      font-family: Georgia, serif;
      font-size: 18px;
      letter-spacing: .72em;
    }

    .menu-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      font-family: var(--display-font);
      font-size: clamp(38px, 5vw, 62px);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--moss);
      text-shadow: 0 10px 28px rgba(67, 87, 66, 0.12);
    }

    .menu-panel {
      width: 100%;
      padding: 18px 0 4px;
    }

    .menu-control {
      min-width: 0;
    }

    .menu-control label {
      display: block;
      margin-bottom: 8px;
      color: var(--moss);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
    }

    .bean-select {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .bean-card-rail {
      position: relative;
      display: flex;
      gap: clamp(26px, 5vw, 76px);
      align-items: flex-start;
      min-height: 390px;
      padding: 12px 8px 24px;
      perspective: 1200px;
    }

    .deck-stack {
      position: relative;
      width: 190px;
      height: 306px;
      flex: 0 0 auto;
      justify-self: center;
      border: 0;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 180ms ease;
    }

    .deck-stack:hover {
      transform: translateY(-5px) rotate(-1deg);
    }

    .deck-stack:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(70, 88, 71, 0.16);
    }

    .deck-stack::before,
    .deck-stack::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background:
        radial-gradient(circle at 50% 50%, rgba(130, 89, 45, 0.18), transparent 28%),
        linear-gradient(135deg, #d9b47c, #f2d9a9 42%, #c58e55);
      box-shadow: 0 20px 38px rgba(52, 35, 20, 0.14);
    }

    .deck-stack::before {
      transform: translate(10px, 10px) rotate(4deg);
      opacity: .62;
    }

    .deck-stack::after {
      transform: translate(5px, 5px) rotate(2deg);
      opacity: .76;
    }

    .deck-card-top {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .drawn-card-wrap {
      display: grid;
      justify-items: start;
      align-items: start;
      flex: 1 1 auto;
      min-height: 340px;
    }

    .deck-draw-card {
      position: absolute;
      left: 38px;
      top: 44px;
      width: 190px;
      height: 306px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transform-origin: center;
    }

    .bean-card-rail.is-drawing .deck-draw-card {
      animation: draw-card 1700ms cubic-bezier(.18, .78, .18, 1) forwards;
    }

    .bean-card-rail.is-drawing .deck-draw-card .tarot-inner {
      animation: draw-flip 1700ms cubic-bezier(.2, .72, .16, 1) forwards;
    }

    .bean-card-rail.is-collecting .drawn-result {
      animation: collect-card 1150ms cubic-bezier(.28, .72, .18, 1) forwards;
      transform-origin: center;
    }

    .bean-card-rail.is-collecting .drawn-result .tarot-inner {
      animation: collect-flip 1150ms cubic-bezier(.28, .72, .18, 1) forwards;
    }

    @keyframes draw-card {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(-6deg) scale(.96);
      }
      26% {
        opacity: 1;
        transform: translate(44px, -8px) rotate(-3deg) scale(.98);
      }
      62% {
        opacity: 1;
        transform: translate(180px, -24px) rotate(3deg) scale(1.06);
      }
      88% {
        opacity: 1;
        transform: translate(248px, -24px) rotate(1deg) scale(1.16);
      }
      100% {
        opacity: 0;
        transform: translate(248px, -24px) rotate(1deg) scale(1.16);
      }
    }

    @keyframes draw-flip {
      0%,
      50% {
        transform: rotateY(0deg);
      }
      82%,
      100% {
        transform: rotateY(180deg);
      }
    }

    @keyframes collect-card {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      34% {
        opacity: 1;
        transform: translate(-70px, -10px) rotate(-2deg) scale(.99);
      }
      78% {
        opacity: 1;
        transform: translate(-210px, 6px) rotate(-5deg) scale(.96);
      }
      100% {
        opacity: 0;
        transform: translate(-248px, 4px) rotate(-6deg) scale(.94);
      }
    }

    @keyframes collect-flip {
      0% {
        transform: rotateY(180deg);
      }
      42% {
        transform: rotateY(180deg);
      }
      100% {
        transform: rotateY(0deg);
      }
    }

    .bean-card {
      position: relative;
      width: 190px;
      height: 306px;
      padding: 0;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: inherit;
      font-family: var(--body-font);
      cursor: default;
      scroll-snap-align: start;
      transform-style: preserve-3d;
    }

    .drawn-card-wrap .bean-card {
      width: 190px;
      height: 306px;
    }

    .drawn-result {
      display: grid;
      gap: 14px;
      justify-items: center;
      align-self: start;
    }

    .reset-draw {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: color-mix(in srgb, var(--active-accent, var(--moss)) 18%, #ffffff);
      color: var(--moss);
      font: 700 13px var(--body-font);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(49, 35, 26, 0.075);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .reset-draw:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(49, 35, 26, 0.11);
    }

    .reset-draw:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(70, 88, 71, 0.15);
    }

    .bean-card:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(70, 88, 71, 0.16);
    }

    .tarot-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 620ms cubic-bezier(.2, .7, .2, 1), filter 220ms ease;
    }

    .bean-card.is-active .tarot-inner,
    .bean-card.is-flipping .tarot-inner {
      transform: rotateY(180deg);
    }

    .tarot-side {
      position: absolute;
      inset: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 15px;
      backface-visibility: hidden;
      box-shadow:
        0 26px 48px rgba(52, 35, 20, 0.18),
        0 0 0 1px rgba(184, 138, 70, 0.16);
    }

    .bean-card-rail .deck-draw-card {
      position: absolute;
      inset: auto;
      left: 38px;
      top: 44px;
      width: 190px;
      height: 306px;
    }

    .tarot-back {
      justify-content: center;
      align-items: center;
      padding: 0;
      background: #d9b47c;
      color: rgba(80, 49, 27, 0.72);
    }

    .tarot-back-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: saturate(.96) contrast(1.02);
    }

    .tarot-face {
      padding: 0;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--card-accent) 18%, #f8fbff), #fffaf0 46%, color-mix(in srgb, var(--card-accent) 16%, #f5efe0));
      transform: rotateY(180deg);
      color: #221916;
    }

    .tarot-art {
      position: absolute;
      inset: 0;
      min-height: 0;
      border-radius: 12px;
      background: color-mix(in srgb, var(--card-accent) 13%, #fff8ea);
      overflow: hidden;
      box-shadow: none;
    }

    .tarot-art img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.015);
    }

    .tarot-title {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 21px;
      z-index: 2;
      display: block;
      margin: 0;
      text-align: center;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.25;
    }

    .bean-card-title {
      display: block;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
    }

    .bean-card-meta {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .bean-card-flavors {
      display: flex;
      gap: 5px;
      margin-top: 14px;
    }

    .bean-card-flavors i {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--card-accent);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.58);
    }

    .menu-current {
      min-width: 260px;
      padding: 15px 17px;
      border-radius: 8px;
      background:
        linear-gradient(140deg, color-mix(in srgb, var(--active-accent, var(--moss)) 30%, #ffffff), rgba(255, 255, 255, 0.78));
      box-shadow: 0 16px 34px rgba(49, 35, 26, 0.075);
      text-align: left;
    }

    .current-label {
      display: block;
      margin: 0 0 8px;
      color: var(--moss);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .menu-current strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.3;
    }

    .menu-current span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .menu-flavors {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .menu-flavors span {
      display: inline-flex;
      margin: 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.64);
      color: var(--moss);
      font-size: 11px;
      line-height: 1.2;
    }

    .profile-label {
      display: inline-flex;
      padding: 7px 10px;
      margin-bottom: 22px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      color: var(--moss);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: var(--display-font);
      font-weight: 400;
      line-height: 1.12;
      letter-spacing: 0.06em;
    }

    h1 {
      max-width: 860px;
      font-size: clamp(40px, 6vw, 74px);
    }

    .bean-overview h1 {
      max-width: 960px;
      font-size: clamp(30px, 3.6vw, 46px);
      line-height: 1.22;
      overflow-wrap: anywhere;
    }

    .intro {
      max-width: 560px;
      margin: 32px 0 0;
      padding-top: 28px;
      border-top: 1px solid rgba(221, 214, 203, 0.58);
      color: #3d342d;
      font-size: 17px;
    }

    .flavor-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .flavor-list span {
      position: relative;
      padding: 8px 15px 8px 30px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(250, 240, 221, 0.74));
      color: var(--moss);
      font-size: 15px;
      box-shadow:
        0 8px 22px rgba(49, 35, 26, 0.055),
        inset 0 0 0 1px rgba(184, 138, 70, 0.16);
    }

    .flavor-list span::before {
      content: "✦";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-family: Georgia, serif;
      font-size: 11px;
    }

    .flavor-text {
      max-width: 680px;
      margin: 24px 0 0;
      padding: 0 0 0 22px;
      border-left: 1px solid rgba(184, 138, 70, 0.46);
      color: #4c4037;
      font-size: 18px;
      line-height: 2;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--moss);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .value {
      color: var(--ink);
      font-size: 16px;
    }

    .section {
      position: relative;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 66px 0;
      border-top: 1px solid var(--line);
    }

    .section::before {
      content: "✦";
      position: absolute;
      top: -12px;
      left: 0;
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #f8f1e6;
      color: rgba(184, 138, 70, 0.72);
      font-family: Georgia, serif;
      font-size: 14px;
    }

    .section h2 {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 34px;
      color: #34231b;
      font-size: clamp(38px, 4.8vw, 58px);
    }

    .section h2::after {
      content: "";
      flex: 1 1 auto;
      height: 1px;
      background: linear-gradient(90deg, rgba(184, 138, 70, 0.34), transparent);
    }

    .info-panel,
    .brew-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 28px;
      align-items: start;
      position: relative;
      padding: clamp(24px, 4vw, 42px);
      border-radius: 28px;
      background:
        radial-gradient(circle at 96% 8%, rgba(184, 138, 70, 0.12), transparent 30%),
        linear-gradient(145deg, rgba(255, 252, 245, 0.78), rgba(247, 237, 218, 0.52));
      box-shadow:
        0 22px 70px rgba(58, 38, 22, 0.075),
        inset 0 0 0 1px rgba(184, 138, 70, 0.13);
      backdrop-filter: blur(4px);
    }

    .info-panel::after,
    .brew-grid::after {
      content: "☽";
      position: absolute;
      right: 24px;
      top: 18px;
      color: rgba(184, 138, 70, 0.28);
      font-family: Georgia, serif;
      font-size: 34px;
    }

    .is-hidden {
      display: none !important;
    }

    .roaster-card {
      display: grid;
      gap: 18px;
      max-width: 760px;
      padding: clamp(22px, 4vw, 38px);
      border-radius: 28px;
      background:
        linear-gradient(135deg, rgba(255, 252, 245, 0.82), rgba(247, 237, 218, 0.58));
      box-shadow:
        0 22px 70px rgba(58, 38, 22, 0.07),
        inset 0 0 0 1px rgba(184, 138, 70, 0.13);
    }

    .roaster-name {
      margin: 0;
      color: var(--ink);
      font-family: var(--display-font);
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 400;
      line-height: 1.1;
    }

    .media-card {
      overflow: hidden;
      border-radius: 24px;
      background: var(--paper);
      box-shadow:
        0 24px 54px rgba(49, 35, 26, 0.10),
        inset 0 0 0 1px rgba(184, 138, 70, 0.12);
    }

    .media-card img {
      width: 100%;
      height: 330px;
      object-fit: cover;
    }

    .media-caption {
      padding: 18px 22px 22px;
      background: rgba(255, 250, 239, 0.9);
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .split-copy {
      max-width: 620px;
      color: #3d342d;
      font-size: 18px;
      line-height: 2;
    }

    .dripper-card {
      margin-top: 24px;
    }

    .dripper-card img {
      height: min(360px, 48vw);
      object-fit: contain;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.82), rgba(245, 234, 214, 0.82));
    }

    .parameter-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border-radius: 24px;
      background: rgba(255, 251, 243, 0.74);
      box-shadow:
        0 18px 42px rgba(49, 35, 26, 0.075),
        inset 0 0 0 1px rgba(184, 138, 70, 0.13);
    }

    .parameter-table th,
    .parameter-table td {
      padding: 16px 18px;
      border-bottom: 1px solid rgba(157, 125, 81, 0.16);
      text-align: left;
      vertical-align: top;
      font-size: 16px;
    }

    .parameter-table th {
      background: rgba(70, 88, 71, 0.08);
      color: var(--moss);
      font-size: 12px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .parameter-table td:first-child {
      width: 42%;
      background: rgba(255, 255, 255, 0.32);
      color: var(--moss);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .note {
      margin-top: 28px;
      padding: 18px 20px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 920px) {
      .page::after {
        opacity: .28;
        right: -90px;
        top: 92px;
      }

      .info-panel,
      .brew-grid,
      .roaster-card {
        grid-template-columns: 1fr;
      }

      .profile-label {
        margin-bottom: 28px;
      }

    }

    @media (max-width: 560px) {
      .site-header,
      .section {
        width: min(100% - 28px, 1180px);
      }

      .brand {
        font-size: 34px;
      }

      .site-header::after {
        top: 34px;
        right: 2px;
        font-size: 13px;
        letter-spacing: .38em;
      }

      .menu-heading {
        align-items: start;
        flex-direction: column;
        gap: 4px;
      }

      .menu-panel {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 14px;
      }

      .bean-card-rail {
        flex-direction: column;
        align-items: center;
        gap: 34px;
        min-height: 390px;
        padding: 18px 24px 28px;
        overflow: visible;
      }

      .drawn-card-wrap {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        justify-items: center;
        width: 100%;
        min-height: 390px;
      }

      .drawn-result {

    const params = new URLSearchParams(window.location.search);
    const requestedBean = params.get("bean");
    let beanId = beans[requestedBean] ? requestedBean : "fasail-washed";
    let bean = beans[beanId];
    let hasDrawnCard = false;
    let isAnimatingCard = false;
    const accentPalette = ["#d99558", "#7f9f77", "#d77f70", "#7b9fb8", "#b895cc", "#c8a24b"];

    function getBeanAccent(id) {
      const keys = Object.keys(beans);
      const index = Math.max(keys.indexOf(id), 0);
      return accentPalette[index % accentPalette.length];
    }

    function pickRandomBeanId() {
      const ids = Object.keys(beans);
      return ids[Math.floor(Math.random() * ids.length)] || beanId;
    }

    function setText(selector, value) {
      const node = document.querySelector(selector);
      if (node) node.textContent = value || "";
    }

    function setHTML(selector, value) {
      const node = document.querySelector(selector);
      if (node) node.innerHTML = value || "";
    }

    function setImage(selector, src, alt) {
      const node = document.querySelector(selector);
      if (!node) return;
      node.src = src || "";
      node.alt = alt || "";
    }

    function renderRoasterDetails() {
      const node = document.querySelector('[data-slot="roasterDetails"]');
      if (!node) return;
      node.innerHTML = `
        <p class="roaster-name">${bean.roasterName}</p>
        ${bean.roaster ? `<p class="split-copy">${bean.roaster}</p>` : ""}
      `;
    }

    function renderFlavors() {
      const node = document.querySelector('[data-list="flavors"]');
      node.innerHTML = bean.flavors.map((flavor) => `<span>${flavor}</span>`).join("");
    }

    function renderMenuFlavors() {
      const node = document.querySelector('[data-list="menuFlavors"]');
      if (!node) return;
      node.innerHTML = bean.flavors.slice(0, 4).map((flavor) => `<span>${flavor}</span>`).join("");
    }

    function renderBrewTable() {
      const node = document.querySelector('[data-list="brewTable"]');
      node.innerHTML = bean.brewTable.map(([label, value]) => `
        <tr>
          <td>${label}</td>
          <td>${value}</td>
        </tr>
      `).join("");
    }

    function renderBeanOptions() {
      const basePath = window.location.pathname;
      const select = document.querySelector('[data-list="beanOptions"]');
      const cards = document.querySelector('[data-list="beanCards"]');

      if (select) {
        select.innerHTML = Object.entries(beans).map(([id, item]) => `
          <option value="${id}" ${id === beanId ? "selected" : ""}>${item.cardName || item.name}</option>
        `).join("");
        select.addEventListener("change", (event) => {
          window.location.href = `${basePath}?bean=${event.target.value}`;
        });
      }

      if (cards) {
        cards.classList.remove("is-drawing", "is-collecting");
        let pendingDrawId = null;
        let pendingDrawBean = null;
        const accent = getBeanAccent(beanId);
        const tarotBack = `<img class="tarot-back-image" src="assets/optimized/cards/tarot-back-wheel.jpg" alt="" decoding="async">`;
        function tarotFaceFor(item) {
          return `
          <span class="tarot-inner">
            <span class="tarot-side tarot-back" aria-hidden="true">${tarotBack}</span>
            <span class="tarot-side tarot-face">
              <span class="tarot-art" aria-hidden="true">
                <img src="${item.cardImage}" alt="${item.cardAlt || item.name}" loading="lazy" decoding="async">
              </span>
              <span class="tarot-title">${item.cardName || item.name}</span>
            </span>
          </span>
          `;
        }

        cards.innerHTML = `
          <button class="deck-stack" type="button" data-draw-random aria-label="从卡组随机抽取一张咖啡牌">
            <span class="deck-card-top tarot-side tarot-back" aria-hidden="true">${tarotBack}</span>
          </button>
          <span class="deck-draw-card bean-card" aria-hidden="true" data-draw-preview>
            ${tarotFaceFor(bean)}
          </span>
          <div class="drawn-card-wrap ${hasDrawnCard ? "" : "is-empty"}">
            ${hasDrawnCard ? `
              <div class="drawn-result">
                <div class="bean-card is-active" style="--card-accent: ${accent}" aria-label="${bean.name}">
                  ${tarotFaceFor(bean)}
                </div>
                <button class="reset-draw" type="button" data-reset-draw>重新抽卡</button>
              </div>
            ` : ""}
          </div>
        `;

        cards.onclick = (event) => {
          const reset = event.target.closest("[data-reset-draw]");
          if (reset) {
            if (!hasDrawnCard || isAnimatingCard) return;
            isAnimatingCard = true;
            cards.classList.add("is-collecting");
            setTimeout(() => {
              hasDrawnCard = false;
              isAnimatingCard = false;
              cards.classList.remove("is-collecting");
              renderPage();
            }, 1150);
            return;
          }

          const deck = event.target.closest("[data-draw-random]");
          if (!deck) return;
          if (hasDrawnCard || isAnimatingCard || cards.classList.contains("is-drawing")) return;
          pendingDrawId = pickRandomBeanId();
          pendingDrawBean = beans[pendingDrawId];
          const preview = cards.querySelector("[data-draw-preview]");
          if (preview && pendingDrawBean) {
            preview.style.setProperty("--card-accent", getBeanAccent(pendingDrawId));
            preview.innerHTML = tarotFaceFor(pendingDrawBean);
          }
          isAnimatingCard = true;
          cards.classList.add("is-drawing");
          setTimeout(() => {
            beanId = pendingDrawId || pickRandomBeanId();
            bean = beans[beanId];
            hasDrawnCard = true;
            isAnimatingCard = false;
            cards.classList.remove("is-drawing");
            window.history.pushState({}, "", `${basePath}?bean=${beanId}`);
            renderPage();
          }, 1700);
        };
      }
    }

    function renderPage() {
      document.title = `${bean.cardName || bean.name} | 当季菜单`;
      document.documentElement.style.setProperty("--active-accent", getBeanAccent(beanId));
      setText('[data-field="menuCurrentName"]', bean.name);
      setText('[data-field="menuCurrentMeta"]', `${bean.metaOrigin} · ${bean.metaProcess}`);
      setText('[data-field="cardName"]', bean.metaOrigin || bean.cardName || bean.name);
      setText('[data-field="flavorText"]', bean.flavorText || "");
      const dripper = dripperImages[bean.dripper] || dripperImages.sd1r;
      setImage('[data-field="brewImage"]', dripper.src, dripper.alt);
      setText('[data-field="brewCaption"]', bean.brewerText || dripper.caption);
      renderFlavors();
      renderMenuFlavors();
      renderRoasterDetails();
      renderBrewTable();
      renderBeanOptions();
    }

    renderPage();
  </script>
