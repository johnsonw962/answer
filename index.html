<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>当季菜单 | Coffee Profile</title>
  <style>
    :root {
      --bg: #fbfaf7;
      --paper: #ffffff;
      --ink: #241a15;
      --muted: #6d625a;
      --line: #ddd6cb;
      --moss: #465847;
      --citrus: #d78438;
      --shadow: 0 24px 70px rgba(49, 35, 26, 0.10);
      --body-font: "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      --display-font: "Avenir Next", "Segoe UI", "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, #fbfaf7 0%, #f5f0e8 46%, #fbfaf7 100%);
      color: var(--ink);
      font-family: var(--body-font);
      line-height: 1.58;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(70, 88, 71, 0.035), transparent 18%, transparent 82%, rgba(215, 132, 56, 0.035));
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent 76%);
    }

    .site-header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 14px;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 30px 0 24px;
      border-bottom: 1px solid rgba(36, 26, 21, 0.07);
    }

    .menu-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      font-family: var(--display-font);
      font-size: clamp(32px, 4vw, 46px);
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--moss);
    }

    .menu-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .menu-panel {
      width: 100%;
      padding: 18px 0 4px;
    }

    .menu-control {
      min-width: 0;
    }

    .menu-control label {
      display: block;
      margin-bottom: 8px;
      color: var(--moss);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .bean-select {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .bean-card-rail {
      position: relative;
      display: flex;
      gap: clamp(26px, 5vw, 76px);
      align-items: center;
      min-height: 390px;
      padding: 12px 8px 24px;
      perspective: 1200px;
    }

    .deck-stack {
      position: relative;
      width: 190px;
      height: 306px;
      flex: 0 0 190px;
      justify-self: center;
      border: 0;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 180ms ease;
    }

    .deck-stack:hover {
      transform: translateY(-5px) rotate(-1deg);
    }

    .deck-stack:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(70, 88, 71, 0.16);
    }

    .deck-stack::before,
    .deck-stack::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background:
        radial-gradient(circle at 50% 50%, rgba(130, 89, 45, 0.18), transparent 28%),
        linear-gradient(135deg, #d9b47c, #f2d9a9 42%, #c58e55);
      box-shadow: 0 20px 38px rgba(52, 35, 20, 0.14);
    }

    .deck-stack::before {
      transform: translate(10px, 10px) rotate(4deg);
      opacity: .62;
    }

    .deck-stack::after {
      transform: translate(5px, 5px) rotate(2deg);
      opacity: .76;
    }

    .deck-card-top {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .drawn-card-wrap {
      display: grid;
      justify-items: start;
      align-items: center;
      flex: 1 1 auto;
      min-height: 340px;
    }

    .deck-draw-card {
      position: absolute;
      left: 38px;
      top: 44px;
      width: 190px;
      height: 306px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transform-origin: center;
    }

    .bean-card-rail.is-drawing .deck-draw-card {
      animation: draw-card 1700ms cubic-bezier(.18, .78, .18, 1) forwards;
    }

    .bean-card-rail.is-drawing .deck-draw-card .tarot-inner {
      animation: draw-flip 1700ms cubic-bezier(.2, .72, .16, 1) forwards;
    }

    .bean-card-rail.is-collecting .drawn-result {
      animation: collect-card 1150ms cubic-bezier(.28, .72, .18, 1) forwards;
      transform-origin: center;
    }

    .bean-card-rail.is-collecting .drawn-result .tarot-inner {
      animation: collect-flip 1150ms cubic-bezier(.28, .72, .18, 1) forwards;
    }

    @keyframes draw-card {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(-6deg) scale(.96);
      }
      26% {
        opacity: 1;
        transform: translate(44px, -8px) rotate(-3deg) scale(.98);
      }
      62% {
        opacity: 1;
        transform: translate(180px, -24px) rotate(3deg) scale(1.06);
      }
      88% {
        opacity: 1;
        transform: translate(248px, -24px) rotate(1deg) scale(1.16);
      }
      100% {
        opacity: 0;
        transform: translate(248px, -24px) rotate(1deg) scale(1.16);
      }
    }

    @keyframes draw-flip {
      0%,
      50% {
        transform: rotateY(0deg);
      }
      82%,
      100% {
        transform: rotateY(180deg);
      }
    }

    @keyframes collect-card {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      34% {
        opacity: 1;
        transform: translate(-70px, -10px) rotate(-2deg) scale(.99);
      }
      78% {
        opacity: 1;
        transform: translate(-210px, 6px) rotate(-5deg) scale(.96);
      }
      100% {
        opacity: 0;
        transform: translate(-248px, 4px) rotate(-6deg) scale(.94);
      }
    }

    @keyframes collect-flip {
      0% {
        transform: rotateY(180deg);
      }
      42% {
        transform: rotateY(180deg);
      }
      100% {
        transform: rotateY(0deg);
      }
    }

    .bean-card {
      position: relative;
      width: 190px;
      height: 306px;
      padding: 0;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: inherit;
      font-family: var(--body-font);
      cursor: default;
      scroll-snap-align: start;
      transform-style: preserve-3d;
    }

    .drawn-card-wrap .bean-card {
      width: 220px;
      height: 354px;
    }

    .drawn-result {
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .reset-draw {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: color-mix(in srgb, var(--active-accent, var(--moss)) 18%, #ffffff);
      color: var(--moss);
      font: 700 13px var(--body-font);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(49, 35, 26, 0.075);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .reset-draw:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(49, 35, 26, 0.11);
    }

    .reset-draw:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(70, 88, 71, 0.15);
    }

    .bean-card:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(70, 88, 71, 0.16);
    }

    .tarot-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 620ms cubic-bezier(.2, .7, .2, 1), filter 220ms ease;
    }

    .bean-card.is-active .tarot-inner,
    .bean-card.is-flipping .tarot-inner {
      transform: rotateY(180deg);
    }

    .tarot-side {
      position: absolute;
      inset: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      backface-visibility: hidden;
      box-shadow: 0 24px 44px rgba(52, 35, 20, 0.18);
    }

    .bean-card-rail .deck-draw-card {
      position: absolute;
      inset: auto;
      left: 38px;
      top: 44px;
      width: 190px;
      height: 306px;
    }

    .tarot-back {
      justify-content: center;
      align-items: center;
      padding: 0;
      background: #d9b47c;
      color: rgba(80, 49, 27, 0.72);
    }

    .tarot-back-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.012);
      filter: saturate(.96) contrast(1.02);
    }

    .tarot-face {
      padding: 0;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--card-accent) 18%, #f8fbff), #fffaf0 46%, color-mix(in srgb, var(--card-accent) 16%, #f5efe0));
      transform: rotateY(180deg);
      color: #221916;
    }

    .tarot-art {
      position: absolute;
      inset: 0;
      min-height: 0;
      border-radius: 12px;
      background: color-mix(in srgb, var(--card-accent) 13%, #fff8ea);
      overflow: hidden;
      box-shadow: none;
    }

    .tarot-art img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.015);
    }

    .tarot-title {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 21px;
      z-index: 2;
      display: block;
      margin: 0;
      text-align: center;
      font-size: 15px;
      font-weight: 850;
      line-height: 1.25;
    }

    .bean-card-title {
      display: block;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
    }

    .bean-card-meta {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .bean-card-flavors {
      display: flex;
      gap: 5px;
      margin-top: 14px;
    }

    .bean-card-flavors i {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--card-accent);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.58);
    }

    .menu-current {
      min-width: 260px;
      padding: 15px 17px;
      border-radius: 8px;
      background:
        linear-gradient(140deg, color-mix(in srgb, var(--active-accent, var(--moss)) 30%, #ffffff), rgba(255, 255, 255, 0.78));
      box-shadow: 0 16px 34px rgba(49, 35, 26, 0.075);
      text-align: left;
    }

    .current-label {
      display: block;
      margin: 0 0 8px;
      color: var(--moss);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .menu-current strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.3;
    }

    .menu-current span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .menu-flavors {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .menu-flavors span {
      display: inline-flex;
      margin: 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--moss);
      font-size: 11px;
      line-height: 1.2;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(360px, 1.08fr);
      gap: 56px;
      align-items: center;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 58px 0 76px;
    }

    .profile-label {
      display: inline-flex;
      padding: 7px 10px;
      margin-bottom: 44px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      color: var(--moss);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: var(--display-font);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: 0.01em;
    }

    h1 {
      max-width: 690px;
      font-size: clamp(46px, 7vw, 88px);
      font-weight: 520;
    }

    .hero-subtitle {
      margin: 24px 0 0;
      color: var(--moss);
      font-size: 20px;
    }

    .intro {
      max-width: 560px;
      margin: 32px 0 0;
      padding-top: 28px;
      border-top: 1px solid rgba(221, 214, 203, 0.58);
      color: #3d342d;
      font-size: 17px;
    }

    .flavor-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .flavor-list span {
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--moss);
      font-size: 14px;
      box-shadow: 0 8px 22px rgba(49, 35, 26, 0.055);
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      max-width: 640px;
      margin-top: 34px;
      padding-top: 26px;
      border-top: 1px solid rgba(221, 214, 203, 0.58);
    }

    .meta-card {
      position: relative;
      overflow: hidden;
      min-height: 98px;
      padding: 18px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 14px 30px rgba(49, 35, 26, 0.055);
    }

    .meta-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, rgba(70, 88, 71, 0.65), rgba(215, 132, 56, 0.42), transparent);
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--moss);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .value {
      color: var(--ink);
      font-size: 16px;
    }

    .hero-visual {
      position: relative;
      min-height: 620px;
      isolation: isolate;
    }

    .farm-photo {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 92%;
      height: 42%;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: -1;
    }

    .coffee-bag {
      position: relative;
      overflow: hidden;
      width: min(470px, 82%);
      min-height: 560px;
      margin-left: auto;
      padding: 78px 50px 54px;
      background:
        linear-gradient(100deg, rgba(255,255,255,0.52), rgba(255,255,255,0) 34%),
        linear-gradient(150deg, #f4efe7, #fffdfa 44%, #e4dbcf);
      border: 0;
      border-radius: 8px;
      box-shadow: 0 34px 76px rgba(36, 26, 21, 0.16);
    }

    .coffee-bag::before {
      content: "";
      position: absolute;
      top: 28px;
      left: 18%;
      right: 18%;
      height: 1px;
      background: rgba(36, 26, 21, 0.16);
    }

    .coffee-bag::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(36, 26, 21, 0.05), transparent 22%, transparent 78%, rgba(36, 26, 21, 0.045));
    }

    .bag-logo {
      margin-bottom: 66px;
      color: var(--moss);
      font-family: var(--display-font);
      font-size: 42px;
      font-weight: 500;
      text-align: center;
      letter-spacing: 0.08em;
    }

    .bag-label {
      margin: 0 auto;
      padding: 32px 26px;
      width: min(275px, 100%);
      background: rgba(255, 255, 255, 0.60);
      border-radius: 8px;
      text-align: center;
      box-shadow:
        inset 0 0 0 8px rgba(255, 255, 255, 0.22),
        0 18px 40px rgba(36, 26, 21, 0.08);
    }

    .bag-label strong {
      display: block;
      font-family: var(--display-font);
      font-size: 25px;
      font-weight: 520;
      line-height: 1.15;
    }

    .bag-label span {
      display: block;
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .section {
      position: relative;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 62px 0;
      border-top: 1px solid rgba(36, 26, 21, 0.08);
    }

    .section h2 {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 34px;
      font-size: clamp(30px, 4vw, 48px);
      font-weight: 520;
    }

    .section h2::after {
      content: "";
      flex: 1 1 auto;
      height: 1px;
      background: linear-gradient(90deg, rgba(70, 88, 71, 0.18), transparent);
    }

    .origin-grid,
    .brew-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 64px;
      align-items: start;
    }

    .roaster-card {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 52px;
      align-items: center;
    }

    .facts {
      display: grid;
      margin: 0;
      padding: 18px 22px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.54);
      box-shadow: 0 18px 42px rgba(49, 35, 26, 0.055);
    }

    .fact-row {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 24px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(36, 26, 21, 0.07);
    }

    .fact-row:first-child {
      padding-top: 0;
    }

    .fact-row:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .fact-row dt {
      color: var(--moss);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .fact-row dd {
      margin: 0;
      color: #3a3029;
      font-size: 16px;
    }

    .media-card {
      overflow: hidden;
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 24px 54px rgba(49, 35, 26, 0.10);
    }

    .media-card img {
      width: 100%;
      height: 330px;
      object-fit: cover;
    }

    .media-caption {
      padding: 18px 20px 20px;
      background: rgba(255, 255, 255, 0.84);
      color: var(--muted);
      font-size: 14px;
    }

    .split-copy {
      max-width: 560px;
      color: #3d342d;
      font-size: 16px;
    }

    .dripper-card {
      margin-top: 24px;
    }

    .brew-methods {
      display: grid;
      gap: 0;
      padding: 16px 18px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.54);
      box-shadow: 0 18px 42px rgba(49, 35, 26, 0.055);
    }

    .method {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(36, 26, 21, 0.07);
      color: #3d342d;
      font-size: 16px;
    }

    .method:first-child {
      padding-top: 0;
    }

    .method:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .method svg {
      width: 28px;
      height: 28px;
      color: var(--moss);
      flex: 0 0 auto;
    }

    .parameter-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.68);
      box-shadow: 0 18px 42px rgba(49, 35, 26, 0.075);
    }

    .parameter-table th,
    .parameter-table td {
      padding: 16px 18px;
      border-bottom: 1px solid rgba(36, 26, 21, 0.07);
      text-align: left;
      vertical-align: top;
    }

    .parameter-table th {
      background: rgba(70, 88, 71, 0.08);
      color: var(--moss);
      font-size: 12px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
    }

    .parameter-table td:first-child {
      width: 42%;
      background: rgba(255, 255, 255, 0.40);
      color: var(--moss);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .note {
      margin-top: 28px;
      padding: 18px 20px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.58);
      color: var(--muted);
      font-size: 14px;
    }

    .footer {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 32px 0 46px;
      border-top: 1px solid rgba(36, 26, 21, 0.08);
      color: var(--muted);
      font-size: 13px;
    }

    .footer a {
      color: var(--moss);
      text-decoration: none;
    }

    @media (max-width: 920px) {
      .hero,
      .origin-grid,
      .brew-grid,
      .roaster-card {
        grid-template-columns: 1fr;
      }

      .hero {
        gap: 36px;
        padding-top: 42px;
      }

      .profile-label {
        margin-bottom: 28px;
      }

      .hero-visual {
        min-height: auto;
      }

      .coffee-bag {
        margin: 0 auto;
      }

      .farm-photo {
        position: relative;
        width: 100%;
        height: 220px;
        margin-top: -70px;
      }

      .hero-meta {
        grid-template-columns: 1fr;
      }

      .fact-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }
    }

    @media (max-width: 560px) {
      .site-header,
      .hero,
      .section,
      .footer {
        width: min(100% - 28px, 1180px);
      }

      .brand {
        font-size: 25px;
      }

      .menu-heading {
        align-items: start;
        flex-direction: column;
        gap: 4px;
      }

      .menu-panel {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 14px;
      }

      .bean-card-rail {
        flex-direction: column;
        gap: 34px;
        min-height: auto;
      }

      .drawn-card-wrap {
        justify-items: center;
        width: 100%;
      }

      .bean-card-rail .deck-draw-card {
        left: calc(50% - 95px);
        top: 12px;
      }

      @keyframes draw-card {
        0% {
          opacity: 1;
          transform: translate(0, 0) rotate(-4deg) scale(.96);
        }
        26% {
          opacity: 1;
          transform: translate(0, 42px) rotate(-2deg) scale(.98);
        }
        62% {
          opacity: 1;
          transform: translate(0, 178px) rotate(4deg) scale(1);
        }
        92% {
          opacity: 1;
          transform: translate(0, 260px) rotate(1deg) scale(1.02);
        }
        100% {
          opacity: 0;
          transform: translate(0, 260px) rotate(1deg) scale(1.02);
        }
      }

      @keyframes collect-card {
        0% {
          opacity: 1;
          transform: translate(0, 0) rotate(0deg) scale(1);
        }
        34% {
          opacity: 1;
          transform: translate(0, -64px) rotate(-2deg) scale(.99);
        }
        78% {
          opacity: 1;
          transform: translate(0, -220px) rotate(-5deg) scale(.96);
        }
        100% {
          opacity: 0;
          transform: translate(0, -260px) rotate(-6deg) scale(.94);
        }
      }

      .menu-current {
        min-width: 0;
      }

      h1 {
        font-size: clamp(40px, 14vw, 64px);
      }

      .hero-subtitle {
        font-size: 17px;
      }

      .coffee-bag {
        width: 100%;
        min-height: 470px;
        padding: 58px 28px 42px;
      }

      .bag-logo {
        margin-bottom: 54px;
        font-size: 34px;
      }

      .section {
        padding: 42px 0;
      }

      .media-card img {
        height: 240px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-header" aria-label="页面导航">
      <div class="menu-heading">
        <div class="brand">当季菜单</div>
        <p class="menu-subtitle">Seasonal Coffee Menu</p>
      </div>
      <div class="menu-panel" aria-label="当季豆单切换">
        <div class="menu-control">
          <label for="beanSelect">抽取当季咖啡</label>
          <select class="bean-select" id="beanSelect" data-list="beanOptions"></select>
          <div class="bean-card-rail" data-list="beanCards" aria-label="当季咖啡豆卡片切换"></div>
        </div>
      </div>
    </header>

    <section class="hero">
      <div>
        <span class="profile-label" data-field="profileLabel"></span>
        <h1 data-field="name"></h1>
        <p class="hero-subtitle" data-field="subtitle"></p>
        <p class="intro" data-field="intro"></p>
        <div class="flavor-list" data-list="flavors" aria-label="风味描述"></div>
        <div class="hero-meta" aria-label="咖啡概览">
          <div class="meta-card">
            <span class="label">Origin</span>
            <span class="value" data-field="metaOrigin"></span>
          </div>
          <div class="meta-card">
            <span class="label">Process</span>
            <span class="value" data-field="metaProcess"></span>
          </div>
          <div class="meta-card">
            <span class="label">Roaster</span>
            <span class="value" data-field="roasterName"></span>
          </div>
        </div>
      </div>

      <div class="hero-visual" aria-label="咖啡包装与庄园视觉">
        <div class="coffee-bag">
          <div class="bag-logo">NAIZUI</div>
          <div class="bag-label">
            <strong data-field="bagTitle"></strong>
            <span data-field="bagProcess"></span>
            <span data-field="bagOrigin"></span>
            <span data-field="bagFlavor"></span>
          </div>
        </div>
        <img class="farm-photo" data-field="heroImage" alt="">
      </div>
    </section>

    <section class="section" id="green">
      <h2>生豆信息</h2>
      <div class="origin-grid">
        <dl class="facts" data-list="greenFacts"></dl>
        <div class="media-card">
          <img data-field="greenImage" alt="">
          <div class="media-caption" data-field="greenNote"></div>
        </div>
      </div>
    </section>

    <section class="section" id="roaster">
      <h2>烘焙商信息</h2>
      <div class="roaster-card">
        <div>
          <span class="label">Roaster Profile</span>
          <p class="split-copy" data-field="roasterNote"></p>
          <dl class="facts" data-list="roasterFacts"></dl>
        </div>
        <div class="media-card">
          <img data-field="roasterImage" alt="">
          <div class="media-caption" data-field="roasterCaption"></div>
        </div>
      </div>
    </section>

    <section class="section" id="brew">
      <h2>萃取</h2>
      <div class="brew-grid">
        <div>
          <span class="label">Recommended Brewer</span>
          <div class="brew-methods" data-list="brewHighlights" aria-label="推荐萃取方式"></div>
          <div class="media-card dripper-card">
            <img data-field="brewImage" alt="">
            <div class="media-caption" data-field="brewCaption"></div>
          </div>
        </div>

        <div>
          <table class="parameter-table" aria-label="手冲萃取参数">
            <thead>
              <tr>
                <th>Parameter</th>
                <th>Recommended</th>
              </tr>
            </thead>
            <tbody data-list="brewTable"></tbody>
          </table>
          <p class="note" data-field="brewNote"></p>
        </div>
      </div>
    </section>

    <footer class="footer">
      Static coffee profile page · Bean ID:
      <span data-field="beanId"></span>
    </footer>
  </main>

    const accentPalette = ["#d99558", "#7f9f77", "#d77f70", "#7b9fb8", "#b895cc", "#c8a24b"];

    function getBeanAccent(id) {
      const keys = Object.keys(beans);
      const index = Math.max(keys.indexOf(id), 0);
      return accentPalette[index % accentPalette.length];
    }

    function setText(selector, value) {
      const node = document.querySelector(selector);
      if (node) node.textContent = value || "";
    }

    function setHTML(selector, value) {
      const node = document.querySelector(selector);
      if (node) node.innerHTML = value || "";
    }

    function setImage(selector, src, alt) {
      const node = document.querySelector(selector);
      if (!node) return;
      node.src = src || "";
      node.alt = alt || "";
    }

    function renderFacts(selector, rows) {
      const node = document.querySelector(selector);
      if (!node) return;
      node.innerHTML = rows.map(([label, value]) => `

          <dt>${label}</dt>
          <dd>${value}</dd>
        </div>
      `).join("");
    }

        function tarotFaceFor(item) {
          return `
          <span class="tarot-inner">
            <span class="tarot-side tarot-back" aria-hidden="true">${tarotBack}</span>
            <span class="tarot-side tarot-face">
              <span class="tarot-art" aria-hidden="true">
                <img src="${item.cardImage}" alt="${item.cardAlt || item.name}">
              </span>
              <span class="tarot-title">${item.cardName || item.name}</span>
            </span>
          </span>
          `;
        }

        cards.innerHTML = `
          <button class="deck-stack" type="button" data-next-bean="${nextId}" aria-label="从卡组抽取下一张咖啡牌">
            <span class="deck-card-top tarot-side tarot-back" aria-hidden="true">${tarotBack}</span>
          </button>
          <span class="deck-draw-card bean-card" style="--card-accent: ${nextAccent}" aria-hidden="true">
            ${tarotFaceFor(nextBean)}
          </span>
          <div class="drawn-card-wrap ${hasDrawnCard ? "" : "is-empty"}">
            ${hasDrawnCard ? `
              <div class="drawn-result">
                <div class="bean-card is-active" style="--card-accent: ${accent}" aria-label="${bean.name}">
                  ${tarotFaceFor(bean)}
                </div>
                <button class="reset-draw" type="button" data-reset-draw>重新抽卡</button>
              </div>
            ` : ""}
          </div>
        `;

        cards.onclick = (event) => {
          const reset = event.target.closest("[data-reset-draw]");
          if (reset) {
            if (!hasDrawnCard || isAnimatingCard) return;
            isAnimatingCard = true;
            cards.classList.add("is-collecting");
            setTimeout(() => {
              hasDrawnCard = false;
              isAnimatingCard = false;
              cards.classList.remove("is-collecting");
              renderPage();
            }, 1150);
            return;
          }

          const deck = event.target.closest("[data-next-bean]");
          if (!deck) return;
          if (hasDrawnCard || isAnimatingCard || cards.classList.contains("is-drawing")) return;
          isAnimatingCard = true;
          cards.classList.add("is-drawing");
          setTimeout(() => {
            beanId = deck.dataset.nextBean;
            bean = beans[beanId];
            hasDrawnCard = true;
            isAnimatingCard = false;
            cards.classList.remove("is-drawing");
            window.history.pushState({}, "", `${basePath}?bean=${beanId}`);
            renderPage();
          }, 1700);
        };
      }
    }

    function renderPage() {
      document.title = `${bean.name} | 当季菜单`;
      document.documentElement.style.setProperty("--active-accent", getBeanAccent(beanId));
      setText('[data-field="menuCurrentName"]', bean.name);
      setText('[data-field="menuCurrentMeta"]', `${bean.metaOrigin} · ${bean.metaProcess}`);
      setText('[data-field="profileLabel"]', bean.profileLabel);
      setText('[data-field="name"]', bean.name);
      setText('[data-field="subtitle"]', bean.subtitle);
      setText('[data-field="intro"]', bean.intro);
      setText('[data-field="metaOrigin"]', bean.metaOrigin);
      setText('[data-field="metaProcess"]', bean.metaProcess);
      setText('[data-field="roasterName"]', bean.roasterName);
      setHTML('[data-field="bagTitle"]', bean.bagTitle);
      setText('[data-field="bagProcess"]', bean.bagProcess);
      setText('[data-field="bagOrigin"]', bean.bagOrigin);
      setText('[data-field="bagFlavor"]', bean.bagFlavor);
      setImage('[data-field="heroImage"]', bean.heroImage, bean.heroAlt);
      setImage('[data-field="greenImage"]', bean.greenImage, bean.greenAlt);
      setText('[data-field="greenNote"]', bean.greenNote);
      setText('[data-field="roasterNote"]', bean.roasterNote);
      setImage('[data-field="roasterImage"]', bean.roasterImage, bean.roasterAlt);
      setText('[data-field="roasterCaption"]', bean.roasterCaption);
      setImage('[data-field="brewImage"]', bean.brewImage, bean.brewAlt);
      setText('[data-field="brewCaption"]', bean.brewCaption);
      setText('[data-field="brewNote"]', bean.brewNote);
      setText('[data-field="beanId"]', beanId);
      renderFlavors();
      renderMenuFlavors();
      renderFacts('[data-list="greenFacts"]', bean.greenFacts);
      renderFacts('[data-list="roasterFacts"]', bean.roasterFacts);
      renderBrewHighlights();
      renderBrewTable();
      renderBeanOptions();
    }

    renderPage();
  </script>
</body>
</html>
