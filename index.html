<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>当季菜单 | Coffee Profile</title>
  <style>
    :root {
      --bg: #fbfaf7;
      --paper: #ffffff;
      --ink: #241a15;
      --muted: #6d625a;
      --line: #ddd6cb;
      --moss: #465847;
      --citrus: #d78438;
      --shadow: 0 24px 70px rgba(49, 35, 26, 0.10);
      --body-font: "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei UI", "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif;
      --display-font: "Avenir Next", "Segoe UI", "HarmonyOS Sans SC", "MiSans", "PingFang SC", "Microsoft YaHei UI", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, #fbfaf7 0%, #f5f0e8 46%, #fbfaf7 100%);
      color: var(--ink);
      font-family: var(--body-font);
      line-height: 1.58;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    .page {
      position: relative;
      min-height: 100vh;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(70, 88, 71, 0.035), transparent 18%, transparent 82%, rgba(215, 132, 56, 0.035));
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent 76%);
    }

    .site-header {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 14px;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 30px 0 24px;
      border-bottom: 1px solid rgba(36, 26, 21, 0.07);
    }

    .menu-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      font-family: var(--display-font);
      font-size: clamp(32px, 4vw, 46px);
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--moss);
    }

    .menu-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .menu-panel {
      width: 100%;
      padding: 18px 0 4px;
    }

    .menu-control {
      min-width: 0;
    }

    .menu-control label {
      display: block;
      margin-bottom: 8px;
      color: var(--moss);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .bean-select {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .bean-card-rail {
      position: relative;
      display: flex;
      gap: clamp(26px, 5vw, 76px);
      align-items: center;
      min-height: 390px;
      padding: 12px 8px 24px;
      perspective: 1200px;
    }

    .deck-stack {
      position: relative;
      width: 190px;
      height: 306px;
      flex: 0 0 190px;
      justify-self: center;
      border: 0;
      border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 180ms ease;
    }

    .deck-stack:hover {
      transform: translateY(-5px) rotate(-1deg);
    }

    .deck-stack:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(70, 88, 71, 0.16);
    }

    .deck-stack::before,
    .deck-stack::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background:
        radial-gradient(circle at 50% 50%, rgba(130, 89, 45, 0.18), transparent 28%),
        linear-gradient(135deg, #d9b47c, #f2d9a9 42%, #c58e55);
      box-shadow: 0 20px 38px rgba(52, 35, 20, 0.14);
    }

    .deck-stack::before {
      transform: translate(10px, 10px) rotate(4deg);
      opacity: .62;
    }

    .deck-stack::after {
      transform: translate(5px, 5px) rotate(2deg);
      opacity: .76;
    }

    .deck-card-top {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .drawn-card-wrap {
      display: grid;
      justify-items: start;
      align-items: center;
      flex: 1 1 auto;
      min-height: 340px;
    }

    .deck-draw-card {
      position: absolute;
      left: 38px;
      top: 44px;
      width: 190px;
      height: 306px;
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transform-origin: center;
    }

    .bean-card-rail.is-drawing .deck-draw-card {
      animation: draw-card 1700ms cubic-bezier(.18, .78, .18, 1) forwards;
    }

    .bean-card-rail.is-drawing .deck-draw-card .tarot-inner {
      animation: draw-flip 1700ms cubic-bezier(.2, .72, .16, 1) forwards;
    }

    .bean-card-rail.is-collecting .drawn-result {
      animation: collect-card 1150ms cubic-bezier(.28, .72, .18, 1) forwards;
      transform-origin: center;
    }

    .bean-card-rail.is-collecting .drawn-result .tarot-inner {
      animation: collect-flip 1150ms cubic-bezier(.28, .72, .18, 1) forwards;
    }

    @keyframes draw-card {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(-6deg) scale(.96);
      }
      26% {
        opacity: 1;
        transform: translate(44px, -8px) rotate(-3deg) scale(.98);
      }
      62% {
        opacity: 1;
        transform: translate(180px, -24px) rotate(3deg) scale(1.06);
      }
      88% {
        opacity: 1;
        transform: translate(248px, -24px) rotate(1deg) scale(1.16);
      }
      100% {
        opacity: 0;
        transform: translate(248px, -24px) rotate(1deg) scale(1.16);
      }
    }

    @keyframes draw-flip {
      0%,
      50% {
        transform: rotateY(0deg);
      }
      82%,
      100% {
        transform: rotateY(180deg);
      }
    }

    @keyframes collect-card {
      0% {
        opacity: 1;
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      34% {
        opacity: 1;
        transform: translate(-70px, -10px) rotate(-2deg) scale(.99);
      }
      78% {
        opacity: 1;
        transform: translate(-210px, 6px) rotate(-5deg) scale(.96);
      }
      100% {
        opacity: 0;
        transform: translate(-248px, 4px) rotate(-6deg) scale(.94);
      }
    }

    @keyframes collect-flip {
      0% {
        transform: rotateY(180deg);
      }
      42% {
        transform: rotateY(180deg);
      }
      100% {
        transform: rotateY(0deg);
      }
    }

    .bean-card {
      position: relative;
      width: 190px;
      height: 306px;
      padding: 0;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: inherit;
      font-family: var(--body-font);
      cursor: default;
      scroll-snap-align: start;
      transform-style: preserve-3d;
    }

    .drawn-card-wrap .bean-card {
      width: 220px;
      height: 354px;
    }

    .drawn-result {
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .reset-draw {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: color-mix(in srgb, var(--active-accent, var(--moss)) 18%, #ffffff);
      color: var(--moss);
      font: 700 13px var(--body-font);
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(49, 35, 26, 0.075);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .reset-draw:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(49, 35, 26, 0.11);
    }

    .reset-draw:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(70, 88, 71, 0.15);
    }

    .bean-card:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(70, 88, 71, 0.16);
    }

    .tarot-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 620ms cubic-bezier(.2, .7, .2, 1), filter 220ms ease;
    }

    .bean-card.is-active .tarot-inner,
    .bean-card.is-flipping .tarot-inner {
      transform: rotateY(180deg);
    }

    .tarot-side {
      position: absolute;
      inset: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      backface-visibility: hidden;
      box-shadow: 0 24px 44px rgba(52, 35, 20, 0.18);
    }

    .bean-card-rail .deck-draw-card {
      position: absolute;
      inset: auto;
      left: 38px;
      top: 44px;
      width: 190px;
      height: 306px;
    }

    .tarot-back {
      justify-content: center;
      align-items: center;
      padding: 16px;
      background:
        radial-gradient(circle at 50% 50%, rgba(130, 89, 45, 0.18), transparent 28%),
        linear-gradient(135deg, #d9b47c, #f2d9a9 42%, #c58e55);
      color: rgba(80, 49, 27, 0.72);
    }

    .tarot-back::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(86, 52, 28, 0.32);
      border-radius: 9px;
      box-shadow: inset 0 0 0 4px rgba(255, 244, 217, 0.23);
    }

    .tarot-back::after {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(86, 52, 28, 0.18);
      border-radius: 7px;
    }

    .tarot-eye {
      position: relative;
      width: 76px;
      height: 42px;
      margin-bottom: 18px;
      border: 2px solid rgba(78, 48, 27, 0.46);
      border-radius: 50%;
      transform: rotate(-2deg);
    }

    .tarot-eye::before {
      content: "";
      position: absolute;
      inset: 11px 27px;
      border-radius: 999px;
      background: rgba(78, 48, 27, 0.42);
      box-shadow: 0 0 0 7px rgba(255, 243, 214, 0.36);
    }

    .tarot-moon {
      position: relative;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      box-shadow: -8px 0 0 rgba(78, 48, 27, 0.38);
      transform: rotate(-18deg);
    }

    .tarot-star {
      position: absolute;
      top: 26px;
      width: 18px;
      height: 18px;
      color: rgba(78, 48, 27, 0.38);
    }

    .tarot-star::before,
    .tarot-star::after {
      content: "";
      position: absolute;
      inset: 8px 0;
      height: 1px;
      background: currentColor;
    }

    .tarot-star::after {
      transform: rotate(90deg);
    }

    .tarot-face {
      padding: 13px 13px 11px;
      background:
        linear-gradient(180deg, color-mix(in srgb, var(--card-accent) 18%, #f8fbff), #fffaf0 46%, color-mix(in srgb, var(--card-accent) 16%, #f5efe0));
      transform: rotateY(180deg);
      color: #221916;
    }

    .tarot-art {
      position: relative;
      flex: 1 1 auto;
      min-height: 176px;
      border-radius: 9px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,.18)),
        color-mix(in srgb, var(--card-accent) 18%, #edf6ff);
      overflow: hidden;
    }

    .tarot-sun {
      position: absolute;
      top: 18px;
      left: 50%;
      width: 38px;
      height: 38px;
      margin-left: -19px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--card-accent) 62%, #ffe08a);
      box-shadow: 0 0 0 12px rgba(255, 255, 255, 0.28);
    }

    .tarot-cup {
      position: absolute;
      left: 50%;
      top: 62px;
      width: 58px;
      height: 64px;
      margin-left: -29px;
      border-radius: 8px 8px 24px 24px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.35), transparent 35%),
        linear-gradient(180deg, #f2c45d, #bf7d35);
      box-shadow: 0 10px 0 -5px rgba(111, 73, 33, 0.5);
    }

    .tarot-cup::after {
      content: "";
      position: absolute;
      left: 24px;
      top: 64px;
      width: 10px;
      height: 42px;
      background: #9a6531;
      box-shadow: -22px 42px 0 5px rgba(154, 101, 49, 0.58), 22px 42px 0 5px rgba(154, 101, 49, 0.58);
    }

    .tarot-stream {
      position: absolute;
      top: 42px;
      width: 2px;
      height: 110px;
      background: color-mix(in srgb, var(--card-accent) 62%, #5aa7d5);
      opacity: .72;
      border-radius: 999px;
    }

    .tarot-stream:nth-child(1) { left: 34px; }
    .tarot-stream:nth-child(2) { right: 34px; }
    .tarot-stream:nth-child(3) { left: 50%; height: 90px; opacity: .48; }

    .tarot-title {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 850;
      line-height: 1.25;
    }

    .tarot-meta {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .tarot-flavors {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 9px;
    }

    .tarot-flavors span {
      padding: 3px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.65);
      color: color-mix(in srgb, var(--card-accent) 55%, #2c211d);
      font-size: 10px;
      font-weight: 700;
    }

    .bean-card-title {
      display: block;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
    }

    .bean-card-meta {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .bean-card-flavors {
      display: flex;
      gap: 5px;
      margin-top: 14px;
    }

    .bean-card-flavors i {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--card-accent);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.58);
    }

    .menu-current {
      min-width: 260px;
      padding: 15px 17px;
      border-radius: 8px;
      background:
        linear-gradient(140deg, color-mix(in srgb, var(--active-accent, var(--moss)) 30%, #ffffff), rgba(255, 255, 255, 0.78));
      box-shadow: 0 16px 34px rgba(49, 35, 26, 0.075);
      text-align: left;
    }

    .current-label {
      display: block;
      margin: 0 0 8px;
      color: var(--moss);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .menu-current strong {
      display: block;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.3;
    }

    .menu-current span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .menu-flavors {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .menu-flavors span {
      display: inline-flex;
      margin: 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      color: var(--moss);
      font-size: 11px;
      line-height: 1.2;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(360px, 1.08fr);
      gap: 56px;
      align-items: center;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 58px 0 76px;
    }

    .profile-label {
      display: inline-flex;
      padding: 7px 10px;
      margin-bottom: 44px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      color: var(--moss);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
    }

    h1,
    h2,
    h3 {
      margin: 0;
      font-family: var(--display-font);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: 0.01em;
    }

    h1 {
      max-width: 690px;
      font-size: clamp(46px, 7vw, 88px);
      font-weight: 520;
    }

    .hero-subtitle {
      margin: 24px 0 0;
      color: var(--moss);
      font-size: 20px;
    }

    .intro {
      max-width: 560px;
      margin: 32px 0 0;
      padding-top: 28px;
      border-top: 1px solid rgba(221, 214, 203, 0.58);
      color: #3d342d;
      font-size: 17px;
    }

    .flavor-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .flavor-list span {
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--moss);
      font-size: 14px;
      box-shadow: 0 8px 22px rgba(49, 35, 26, 0.055);
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
      max-width: 640px;
      margin-top: 34px;
      padding-top: 26px;
      border-top: 1px solid rgba(221, 214, 203, 0.58);
    }

    .meta-card {
      position: relative;
      overflow: hidden;
      min-height: 98px;
      padding: 18px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 14px 30px rgba(49, 35, 26, 0.055);
    }

    .meta-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, rgba(70, 88, 71, 0.65), rgba(215, 132, 56, 0.42), transparent);
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--moss);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .value {
      color: var(--ink);
      font-size: 16px;
    }

    .hero-visual {
      position: relative;
      min-height: 620px;
      isolation: isolate;
    }

    .farm-photo {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 92%;
      height: 42%;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: -1;
    }

    .coffee-bag {
      position: relative;
      overflow: hidden;
      width: min(470px, 82%);
      min-height: 560px;
      margin-left: auto;
      padding: 78px 50px 54px;
      background:
        linear-gradient(100deg, rgba(255,255,255,0.52), rgba(255,255,255,0) 34%),
        linear-gradient(150deg, #f4efe7, #fffdfa 44%, #e4dbcf);
      border: 0;
      border-radius: 8px;
      box-shadow: 0 34px 76px rgba(36, 26, 21, 0.16);
    }

    .coffee-bag::before {
      content: "";
      position: absolute;
      top: 28px;
      left: 18%;
      right: 18%;
      height: 1px;
      background: rgba(36, 26, 21, 0.16);
    }

    .coffee-bag::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(36, 26, 21, 0.05), transparent 22%, transparent 78%, rgba(36, 26, 21, 0.045));
    }

    .bag-logo {
      margin-bottom: 66px;
      color: var(--moss);
      font-family: var(--display-font);
      font-size: 42px;
      font-weight: 500;
      text-align: center;
      letter-spacing: 0.08em;
    }

    .bag-label {
      margin: 0 auto;
      padding: 32px 26px;
      width: min(275px, 100%);
      background: rgba(255, 255, 255, 0.60);
      border-radius: 8px;
      text-align: center;
      box-shadow:
        inset 0 0 0 8px rgba(255, 255, 255, 0.22),
        0 18px 40px rgba(36, 26, 21, 0.08);
    }

    .bag-label strong {
      display: block;
      font-family: var(--display-font);
      font-size: 25px;
      font-weight: 520;
      line-height: 1.15;
    }

    .bag-label span {
      display: block;
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .section {
      position: relative;
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 62px 0;
      border-top: 1px solid rgba(36, 26, 21, 0.08);
    }

    .section h2 {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 34px;
      font-size: clamp(30px, 4vw, 48px);
      font-weight: 520;
    }

    .section h2::after {
      content: "";
      flex: 1 1 auto;
      height: 1px;
      background: linear-gradient(90deg, rgba(70, 88, 71, 0.18), transparent);
    }

    .origin-grid,
    .brew-grid {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 64px;
      align-items: start;
    }

    .roaster-card {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 52px;
      align-items: center;
    }

    .facts {
      display: grid;
      margin: 0;
      padding: 18px 22px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.54);
      box-shadow: 0 18px 42px rgba(49, 35, 26, 0.055);
    }

    .fact-row {
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr);
      gap: 24px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(36, 26, 21, 0.07);
    }

    .fact-row:first-child {
      padding-top: 0;
    }

    .fact-row:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .fact-row dt {
      color: var(--moss);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.13em;

    .media-card {

      border-radius: 8px;
      background: var(--paper);

      padding: 13px 0;
      border-bottom: 1px solid rgba(36, 26, 21, 0.07);
      color: #3d342d;
      font-size: 16px;
    }

    .method:first-child {
      padding-top: 0;
    }

    .method:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

      width: 28px;
      height: 28px;
      color: var(--moss);
      flex: 0 0 auto;

    .parameter-table {

      border-collapse: separate;
      border-spacing: 0;

      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;

      background: rgba(255, 255, 255, 0.58);

      padding: 32px 0 46px;
      border-top: 1px solid rgba(36, 26, 21, 0.08);

      .profile-label {

      const node = document.querySelector(selector);
      if (node) node.innerHTML = value || "";
    }

    function setImage(selector, src, alt) {
      const node = document.querySelector(selector);
      if (!node) return;
      node.src = src || "";
      node.alt = alt || "";
    }

    function renderFacts(selector, rows) {
      const node = document.querySelector(selector);
      if (!node) return;
      node.innerHTML = rows.map(([label, value]) => `
        <div class="fact-row">
          <dt>${label}</dt>
          <dd>${value}</dd>
        </div>
      `).join("");
    }

    function renderFlavors() {
      const node = document.querySelector('[data-list="flavors"]');
      node.innerHTML = bean.flavors.map((flavor) => `<span>${flavor}</span>`).join("");
    }

    function renderMenuFlavors() {
      const node = document.querySelector('[data-list="menuFlavors"]');
      if (!node) return;
      node.innerHTML = bean.flavors.slice(0, 4).map((flavor) => `<span>${flavor}</span>`).join("");
    }

    function renderBrewHighlights() {
      const node = document.querySelector('[data-list="brewHighlights"]');
      const icons = [
        '<path d="M7 4h10l-1.3 7.8a4.6 4.6 0 0 1-9.1 0L7 4Z"/><path d="M6 21h12"/><path d="M12 16v5"/><path d="M16.5 7h2a2 2 0 0 1 0 4h-2.4"/>',
        '<path d="M6 6h12"/><path d="M8 6l2 13h4l2-13"/><path d="M9 11h6"/><path d="M10 15h4"/>',
        '<path d="M4 18c3-6 5.5-9 8-9s5 3 8 9"/><path d="M8 18c1.5-3 2.8-4.5 4-4.5s2.5 1.5 4 4"/><path d="M12 4v4"/>'
      ];
      node.innerHTML = bean.brewHighlights.map((item, index) => `
        <div class="method">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">${icons[index % icons.length]}</svg>
          <span>${item}</span>
        </div>
      `).join("");
    }

    function renderBrewTable() {
      const node = document.querySelector('[data-list="brewTable"]');
      node.innerHTML = bean.brewTable.map(([label, value]) => `
        <tr>
          <td>${label}</td>
          <td>${value}</td>
        </tr>
      `).join("");
    }

    function renderBeanOptions() {
      const basePath = window.location.pathname;
      const select = document.querySelector('[data-list="beanOptions"]');
      const cards = document.querySelector('[data-list="beanCards"]');

      if (select) {
        select.innerHTML = Object.entries(beans).map(([id, item]) => `
          <option value="${id}" ${id === beanId ? "selected" : ""}>${item.name} / ${item.metaOrigin} / ${item.metaProcess}</option>
        `).join("");
        select.addEventListener("change", (event) => {
          window.location.href = `${basePath}?bean=${event.target.value}`;
        });
      }

      if (cards) {
        cards.classList.remove("is-drawing", "is-collecting");
        const beanEntries = Object.entries(beans);
        const currentIndex = Math.max(beanEntries.findIndex(([id]) => id === beanId), 0);
        const nextId = beanEntries[(currentIndex + 1) % beanEntries.length][0];
        const nextBean = beans[nextId];
        const accent = getBeanAccent(beanId);
        const nextAccent = getBeanAccent(nextId);
        const flavorTags = bean.flavors.slice(0, 3).map((flavor) => `<span>${flavor}</span>`).join("");
        const nextFlavorTags = nextBean.flavors.slice(0, 3).map((flavor) => `<span>${flavor}</span>`).join("");
        const tarotBack = `
          <span class="tarot-star"></span>
          <span class="tarot-eye"></span>
          <span class="tarot-moon"></span>
        `;
        function tarotFaceFor(item, tags) {
          return `
          <span class="tarot-inner">
            <span class="tarot-side tarot-back" aria-hidden="true">${tarotBack}</span>
            <span class="tarot-side tarot-face">
              <span class="tarot-art" aria-hidden="true">
                <span class="tarot-stream"></span>
                <span class="tarot-stream"></span>
                <span class="tarot-stream"></span>
                <span class="tarot-sun"></span>
                <span class="tarot-cup"></span>
              </span>
              <span class="tarot-title">${item.name}</span>
              <span class="tarot-meta">${item.metaOrigin} · ${item.metaProcess}</span>
              <span class="tarot-flavors">${tags}</span>
            </span>
          </span>
          `;
        }

        cards.innerHTML = `
          <button class="deck-stack" type="button" data-next-bean="${nextId}" aria-label="从卡组抽取下一张咖啡牌">
            <span class="deck-card-top tarot-side tarot-back" aria-hidden="true">${tarotBack}</span>
          </button>
          <span class="deck-draw-card bean-card" style="--card-accent: ${nextAccent}" aria-hidden="true">
            ${tarotFaceFor(nextBean, nextFlavorTags)}
          </span>
          <div class="drawn-card-wrap ${hasDrawnCard ? "" : "is-empty"}">
            ${hasDrawnCard ? `
              <div class="drawn-result">
                <div class="bean-card is-active" style="--card-accent: ${accent}" aria-label="${bean.name}">
                  ${tarotFaceFor(bean, flavorTags)}
                </div>
                <button class="reset-draw" type="button" data-reset-draw>重新抽卡</button>
              </div>
            ` : ""}
          </div>
        `;

        cards.onclick = (event) => {
          const reset = event.target.closest("[data-reset-draw]");
          if (reset) {
            if (!hasDrawnCard || isAnimatingCard) return;
            isAnimatingCard = true;
            cards.classList.add("is-collecting");
            setTimeout(() => {
              hasDrawnCard = false;
              isAnimatingCard = false;
              cards.classList.remove("is-collecting");
              renderPage();
            }, 1150);
            return;
          }

          const deck = event.target.closest("[data-next-bean]");
          if (!deck) return;
          if (hasDrawnCard || isAnimatingCard || cards.classList.contains("is-drawing")) return;
          isAnimatingCard = true;
          cards.classList.add("is-drawing");
          setTimeout(() => {
            beanId = deck.dataset.nextBean;
            bean = beans[beanId];
            hasDrawnCard = true;
            isAnimatingCard = false;
            cards.classList.remove("is-drawing");
            window.history.pushState({}, "", `${basePath}?bean=${beanId}`);
            renderPage();
          }, 1700);
        };
      }
    }

    function renderPage() {
      document.title = `${bean.name} | 当季菜单`;
      document.documentElement.style.setProperty("--active-accent", getBeanAccent(beanId));
      setText('[data-field="menuCurrentName"]', bean.name);
      setText('[data-field="menuCurrentMeta"]', `${bean.metaOrigin} · ${bean.metaProcess}`);
      setText('[data-field="profileLabel"]', bean.profileLabel);
      setText('[data-field="name"]', bean.name);
      setText('[data-field="subtitle"]', bean.subtitle);
      setText('[data-field="intro"]', bean.intro);
      setText('[data-field="metaOrigin"]', bean.metaOrigin);
      setText('[data-field="metaProcess"]', bean.metaProcess);
      setText('[data-field="roasterName"]', bean.roasterName);
      setHTML('[data-field="bagTitle"]', bean.bagTitle);
      setText('[data-field="bagProcess"]', bean.bagProcess);
      setText('[data-field="bagOrigin"]', bean.bagOrigin);
      setText('[data-field="bagFlavor"]', bean.bagFlavor);
      setImage('[data-field="heroImage"]', bean.heroImage, bean.heroAlt);
      setImage('[data-field="greenImage"]', bean.greenImage, bean.greenAlt);
      setText('[data-field="greenNote"]', bean.greenNote);
      setText('[data-field="roasterNote"]', bean.roasterNote);
      setImage('[data-field="roasterImage"]', bean.roasterImage, bean.roasterAlt);
      setText('[data-field="roasterCaption"]', bean.roasterCaption);
      setImage('[data-field="brewImage"]', bean.brewImage, bean.brewAlt);
      setText('[data-field="brewCaption"]', bean.brewCaption);
      setText('[data-field="brewNote"]', bean.brewNote);
      setText('[data-field="beanId"]', beanId);
      renderFlavors();
      renderMenuFlavors();
      renderFacts('[data-list="greenFacts"]', bean.greenFacts);
      renderFacts('[data-list="roasterFacts"]', bean.roasterFacts);
      renderBrewHighlights();
      renderBrewTable();
      renderBeanOptions();
    }

    renderPage();
  </script>
</body>
</html>
